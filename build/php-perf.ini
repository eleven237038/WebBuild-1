; OPcache - cache compiled PHP bytecode in shared memory instead of recompiling
; every script on every request. Single biggest PHP runtime win.
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
; Re-stat each file at most once per 60s. Consecutive page loads within the
; window skip stat() entirely (huge on Windows Docker's slow FS), while file
; edits still auto-take-effect within 60s. Use opcache-reset.php for instant
; invalidation during active development.
opcache.revalidate_freq=60
opcache.validate_timestamps=1
opcache.save_comments=1

; APCu - in-memory user cache (replaces the file cache's per-request glob+flock).
apc.enabled=1
apc.shm_size=64M
apc.ttl=3600
apc.enable_cli=0
